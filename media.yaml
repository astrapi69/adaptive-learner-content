# media.yaml — curated free supplementary media per domain (EXP-029).
#
# Optional companion to the lesson catalogue and to books.yaml: maps a
# content domain to a list of free, openly accessible media (videos,
# podcasts, articles) the app can surface as further study material.
#
# Like books.yaml, this file is NOT a content set and is not processed by
# scripts/validate_content.py for the lesson schema. It only has to be
# valid YAML.
#
# Curation rules (EXP-029):
#   - Free media only (paid material belongs in books.yaml).
#   - No affiliate links, no tracking parameters.
#   - No paywalled courses.
#   - Every url is a real, working http/https link (validated).
#   - language: de or en (the language of the resource).
#   - level: beginner | intermediate | advanced, where meaningful.
#   - type: youtube | podcast | article | book.
#         ``book`` surfaces the companion book of a set as the first
#         "further study" item; the canonical book record still lives
#         in books.yaml.
#   - set: optional set id an entry is tied to (e.g. ``ki-einsteiger``).
#   - priority: lower sorts first. The companion ``book`` of a set uses
#         ``priority: 0`` so it appears before all videos and links;
#         every other entry defaults to ``priority: 10``.

language:
  - title: "Easy Spanish — real street conversations"
    type: youtube
    url: "https://www.youtube.com/@EasySpanish"
    language: en
    level: beginner
    description: >-
      Subtitled street interviews from Spain and Mexico. Great
      listening practice with both Spanish and English captions.
  - title: "Easy French — learn French from the streets"
    type: youtube
    url: "https://www.youtube.com/@EasyFrench"
    language: en
    level: beginner
    description: >-
      The French channel of the Easy Languages network: authentic
      everyday French with dual subtitles.
  - title: "Duolingo Spanish Podcast"
    type: podcast
    url: "https://podcast.duolingo.com/spanish"
    language: en
    level: intermediate
    description: >-
      Real-life stories told in simple Spanish with English narration —
      ideal for the A2/B1 transition. Hosted by Martina Castro.
