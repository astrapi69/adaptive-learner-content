# media.yaml — curated free supplementary media per domain (EXP-029).
#
# Optional companion to the lesson catalogue and to books.yaml: maps a
# content domain to a list of free, openly accessible media (videos,
# podcasts, articles) the app can surface as further study material.
#
# Like books.yaml, this file is NOT a content set and is not processed by
# scripts/validate_content.py for the lesson schema. It only has to be
# valid YAML.
#
# Curation rules (EXP-029):
#   - Free media only (paid material belongs in books.yaml).
#   - No affiliate links, no tracking parameters.
#   - No paywalled courses.
#   - Every url is a real, working http/https link (validated).
#   - language: de or en (the language of the resource).
#   - level: beginner | intermediate | advanced, where meaningful.
#   - type: youtube | podcast | article | book.
#         ``book`` surfaces the companion book of a set as the first
#         "further study" item; the canonical book record still lives
#         in books.yaml.
#   - set: optional set id an entry is tied to (e.g. ``ki-einsteiger``).
#   - priority: lower sorts first. The companion ``book`` of a set uses
#         ``priority: 0`` so it appears before all videos and links;
#         every other entry defaults to ``priority: 10``.

language:
  - title: "Easy Spanish — real street conversations"
    type: youtube
    url: "https://www.youtube.com/@EasySpanish"
    language: en
    level: beginner
    description: >-
      Subtitled street interviews from Spain and Mexico. Great
      listening practice with both Spanish and English captions.
  - title: "Easy French — learn French from the streets"
    type: youtube
    url: "https://www.youtube.com/@EasyFrench"
    language: en
    level: beginner
    description: >-
      The French channel of the Easy Languages network: authentic
      everyday French with dual subtitles.
  - title: "Duolingo Spanish Podcast"
    type: podcast
    url: "https://podcast.duolingo.com/spanish"
    language: en
    level: intermediate
    description: >-
      Real-life stories told in simple Spanish with English narration —
      ideal for the A2/B1 transition. Hosted by Martina Castro.
  - title: "Spanish language (Wikipedia)"
    type: article
    url: "https://en.wikipedia.org/wiki/Spanish_language"
    language: en
    description: >-
      Background on the history, geography and grammar of Spanish —
      useful context for learners.
  - title: "Französische Sprache (Wikipedia)"
    type: article
    url: "https://de.wikipedia.org/wiki/Franz%C3%B6sische_Sprache"
    language: de
    description: >-
      Deutschsprachiger Überblick über die französische Sprache:
      Verbreitung, Aussprache und Grammatik.
  - title: "Japanese Ammo with Misa — Japanese for absolute beginners"
    type: youtube
    set: ja-a1-from-de
    url: "https://www.youtube.com/@JapaneseAmmowithMisa"
    language: en
    level: beginner
    description: >-
      Clear, free beginner Japanese lessons (Hiragana, basic
      grammar and everyday phrases) explained step by step in
      English — a great companion to the Japanese A1 set.
  - title: "Talk To Me In Korean — Korean for beginners"
    type: youtube
    set: ko-a1-from-de
    url: "https://www.youtube.com/@talktomeinkorean"
    language: en
    level: beginner
    description: >-
      The free TTMIK lessons: Hangul, greetings and everyday
      Korean explained clearly in English — a great companion to
      the Korean A1 set.
  - title: "Easy Italian — learn Italian from the streets"
    type: youtube
    set: it-a1-from-de
    url: "https://www.youtube.com/@EasyItalian"
    language: en
    level: beginner
    description: >-
      The Italian channel of the Easy Languages network: authentic
      everyday Italian with dual subtitles — a great companion to
      the Italian A1 set.
  - title: "Speaking Brazilian Language School — Brazilian Portuguese for beginners"
    type: youtube
    set: pt-br-a1-from-de
    url: "https://www.youtube.com/@SpeakingBrazilian"
    language: en
    level: beginner
    description: >-
      Free Brazilian Portuguese lessons (pronunciation, grammar
      and everyday vocabulary) taught by a native Brazilian
      teacher — a great companion to the Brazilian Portuguese A1
      set.
  - title: "ChineseClass101 — Mandarin Chinese for beginners"
    type: youtube
    set: zh-a1-from-de
    url: "https://www.youtube.com/@ChineseClass101"
    language: en
    level: beginner
    description: >-
      Free Mandarin lessons covering Pinyin, the four tones,
      greetings and everyday vocabulary, explained in English —
      a great companion to the Mandarin Chinese A1 set.
