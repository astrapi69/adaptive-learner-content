# Adaptive Learner — official content repository root manifest.
#
# https://github.com/astrapi69/adaptive-learner-content
#
# The Content-Loader fetches this file on every refresh and reads
# ``sets`` for the Set Browser listing (ContentManifest schema, see
# adaptive_learner_content_loader/models.py in the main project).
# Each set's lesson list lives in ``sets/{id}/manifest.yaml``.
schema_version: '1.1'
name: Adaptive Learner Official Content
description: >-
  Official lesson sets for Adaptive Learner. Pilot release:
  French A1 (10 lessons) and Spanish A1 (5 lessons). Community
  contributions arrive via pull request.
sets:
  - id: language-fr-a1
    title: French A1 (Beginner)
    language: fr
    level: A1
    version: '1.2.0'
    lesson_count: 10
    domain: language
    description: >-
      Ten lessons of A1-level French: greetings, numbers,
      articles, être/avoir, self-introduction, family,
      colors + clothing, restaurant, directions, and the
      passé composé. Roughly two hours total. Demonstrates
      every Phase 43 exercise type (matching, picture-choice,
      free-text, word-tiles) across multiple grammar topics.
    tags:
      - beginner
      - travel
      - everyday
  - id: language-es-a1
    title: Español A1 (Principiante)
    language: es
    level: A1
    version: '1.1.0'
    lesson_count: 5
    domain: language
    description: >-
      Five lessons covering A1 essentials, with the ser/estar
      challenge treated as the central A1 grammar topic.
      Runs ~70 minutes total. Demonstrates every Phase 43
      exercise type (matching, picture-choice, free-text,
      word-tiles).
    tags:
      - beginner
      - travel
      - everyday
metadata:
  author: Asterios Raptis
  license: CC-BY-SA-4.0
  homepage: https://github.com/astrapi69/adaptive-learner-content
