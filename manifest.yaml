# Adaptive Learner content repository — root manifest
# (Phase 60 / v1.44.0).
#
# Canonical mirror of the public ``astrapi69/adaptive-learner-content``
# repo. Bundled verbatim into the GH-Pages build (see
# ``frontend/scripts/copy-bundled-content.mjs``) so first-time
# visitors get lessons offline, and re-fetched live from GitHub
# when a backend / network is available (higher version wins; on
# a tie GitHub is preferred, the bundled copy survives offline).
#
# Phase 60 reorganised the tree by SOURCE language: every set
# declares the language the learner is LEARNING (target_language)
# AND the language the explanations are written in
# (source_language). The set id encodes the pair
# (``fr-a1-from-en``) and ``path`` points at the source-language
# directory (``sets/en/fr-a1``). The loader reads ``path``; it
# does not parse the id.
schema_version: '1.2'
name: Adaptive Learner Official Content
description: >-
  Official lesson sets for Adaptive Learner, organised by
  source language. Pilot release: French A1 and Spanish A1 for
  English speakers (sets/en) and for German speakers (sets/de).
  Community contributions arrive via pull request.
sets:
  - id: en-a1-from-hi
    title: अंग्रेज़ी A1 (हिंदी भाषियों के लिए)
    title_native: English A1
    target_language: en
    source_language: hi
    level: A1
    path: sets/hi/en-a1
    version: '1.1.0'
    lesson_count: 10
    domain: language
    description: >-
      English set for Hindi speakers (I18N-11, EXP-027 §1; 10
      lessons): basic vocabulary (greetings, numbers, colours),
      everyday sentences, grammar basics (articles + the verb to
      be), family and relationships, food and drink, directions and
      places, shopping and money, time and date, politeness, and
      travel and transport.
    tags:
      - beginner
      - everyday
  - id: fr-a1-from-en
    title: French A1 (for English speakers)
    title_native: Français A1
    target_language: fr
    source_language: en
    level: A1
    path: sets/en/fr-a1
    version: '1.3.0'
    lesson_count: 15
    domain: language
    description: >-
      Full 15-lesson A1 French course explained in English:
      greetings, numbers, articles, être/avoir, self-
      introduction, family, colors + clothing, restaurant,
      directions, the passé composé (avoir and être), telling
      time + daily routine, food shopping, and the futur proche,
      closing with an A1 review. Roughly three hours total.
    tags:
      - beginner
      - travel
      - everyday
  - id: es-a1-from-en
    title: Spanish A1 (for English speakers)
    title_native: Español A1
    target_language: es
    source_language: en
    level: A1
    path: sets/en/es-a1
    version: '1.2.0'
    lesson_count: 15
    domain: language
    description: >-
      Full 15-lesson A1 Spanish course explained in English,
      from greetings through the preterite, with the ser/estar
      challenge as the central A1 grammar topic. Roughly three
      hours total.
    tags:
      - beginner
      - travel
      - everyday
  - id: es-a2-from-en
    title: Spanish A2 — Elementary
    title_native: Español A2 — Elemental
    target_language: es
    source_language: en
    level: A2
    path: sets/en/es-a2
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Intermediate Spanish for English speakers (15 lessons),
      building on A1: the preterite (deepened) and the imperfect
      with their contrast, the futuro simple and condicional,
      object and reflexive pronouns, ser vs estar and por vs para
      deepened, an introduction to the subjunctive, and everyday
      topics (travel, food, health, shopping), closing with review
      and text production. Presupposes A1; mostly productive.
      Explanations in English (schema v1.3).
    tags:
      - elementary
      - grammar
      - everyday
  - id: es-b1-from-en
    title: Spanish B1 — Intermediate
    title_native: Español B1 — Intermedio
    target_language: es
    source_language: en
    level: B1
    path: sets/en/es-b1
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Intermediate Spanish for English speakers (15 lessons),
      building on A1+A2: the present subjunctive and its triggers,
      conditional sentences (si-clauses with the imperfect
      subjunctive), the pluperfect, the passive and impersonal se,
      reported speech, relative pronouns, connectors, and abstract
      topics (work, health, media, environment/society,
      intercultural communication), closing with text production.
      Presupposes A1+A2; mostly productive. Explanations in English
      (schema v1.3).
    tags:
      - intermediate
      - grammar
      - everyday
  - id: de-a1-from-en
    title: German A1 (for English speakers)
    title_native: Deutsch A1
    target_language: de
    source_language: en
    level: A1
    path: sets/en/de-a1
    version: '1.0.0'
    lesson_count: 5
    domain: language
    description: >-
      Five starter German lessons explained in English: greetings
      and introducing yourself, numbers 1-10 and colours, the
      articles der/die/das with the verb "sein", family members,
      and food, drink and useful everyday phrases.
    tags:
      - beginner
      - everyday
      - travel
  - id: fr-a2-from-en
    title: French A2 — Elementary
    title_native: Français A2 — Élémentaire
    target_language: fr
    source_language: en
    level: A2
    path: sets/en/fr-a2
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Intermediate French for English speakers (15 lessons),
      building on A1: the passé composé (avoir and être with
      agreement), the imparfait and the passé composé vs imparfait
      distinction, the futur simple and conditionnel présent, the
      pronouns y and en, deepened negation, conjunctions, and
      everyday topics (describing people, daily life, travel, food,
      health, shopping), closing with review and text production.
      Presupposes A1; mostly productive. Explanations in English
      (schema v1.3).
    tags:
      - elementary
      - grammar
      - everyday
  - id: fr-a1-from-de
    title: Französisch A1 (für Deutschsprachige)
    title_native: Français A1
    target_language: fr
    source_language: de
    level: A1
    path: sets/de/fr-a1
    version: '1.1.0'
    lesson_count: 15
    domain: language
    description: >-
      Vollständiger A1-Kurs Französisch für Deutschsprachige (15
      Lektionen): von Begrüßung, Zahlen und Artikeln über
      être/avoir, Familie, Farben und Restaurant bis zum passé
      composé, zur Uhrzeit, zum Einkaufen und zum futur proche.
      Erklärungen und Übersetzungen auf Deutsch.
    tags:
      - beginner
      - everyday
  - id: fr-a2-from-de
    title: Französisch A2 — Grundlagen
    title_native: Français A2 — Élémentaire
    target_language: fr
    source_language: de
    level: A2
    path: sets/de/fr-a2
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Aufbaukurs Französisch A2 für Deutschsprachige (15
      Lektionen): baut auf A1 auf mit den Vergangenheitsformen
      (passé composé vertieft, imparfait, beide im Kontrast),
      futur simple und conditionnel, den Objektpronomen (COD,
      COI, en, y), der erweiterten Verneinung, Konjunktionen,
      Komparativ/Superlativ, längeren Lesetexten und si-Sätzen.
      Setzt das A1-Wissen voraus. Erklärungen auf Deutsch
      (schema v1.3).
    tags:
      - elementary
      - grammar
      - everyday
  - id: fr-b1-from-de
    title: Französisch B1 — Mittelstufe
    title_native: Français B1 — Intermédiaire
    target_language: fr
    source_language: de
    level: B1
    path: sets/de/fr-b1
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Mittelstufenkurs Französisch B1 für Deutschsprachige (15
      Lektionen): baut auf A1+A2 auf mit dem Subjonctif (présent
      und Auslöser), conditionnel passé, plus-que-parfait, Passiv,
      indirekter Rede, vertieften Relativpronomen und Konnektoren
      sowie abstrakteren Themen (Arbeit, Gesundheit, Medien,
      Umwelt/Gesellschaft, interkulturelle Kommunikation) und der
      Textproduktion. Setzt das A1+A2-Wissen voraus, überwiegend
      produktiv. Erklärungen auf Deutsch (schema v1.3).
    tags:
      - intermediate
      - grammar
      - everyday
  - id: es-a1-from-de
    title: Spanisch A1 (für Deutschsprachige)
    title_native: Español A1
    target_language: es
    source_language: de
    level: A1
    path: sets/de/es-a1
    version: '1.1.0'
    lesson_count: 15
    domain: language
    description: >-
      Vollständiger A1-Kurs Spanisch für Deutschsprachige (15
      Lektionen): von Begrüßung und Zahlen über ser/estar,
      Verben und Wortschatz bis zum Indefinido. Erklärungen und
      Übersetzungen auf Deutsch.
    tags:
      - beginner
      - everyday
  - id: es-a2-from-de
    title: Spanisch A2 — Grundlagen
    title_native: Español A2 — Elemental
    target_language: es
    source_language: de
    level: A2
    path: sets/de/es-a2
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Aufbaukurs Spanisch A2 für Deutschsprachige (15 Lektionen):
      baut auf A1 auf mit den Vergangenheitsformen (indefinido
      vertieft, imperfecto, beide im Kontrast), futuro simple und
      condicional, den Objekt- und Reflexivpronomen, gustar, por
      vs. para, der Vertiefung von ser vs. estar, einer Einführung
      in den subjuntivo, Komparativ/Superlativ, längeren Texten
      und Konnektoren. Setzt das A1-Wissen voraus. Erklärungen auf
      Deutsch (schema v1.3).
    tags:
      - elementary
      - grammar
      - everyday
  - id: es-b1-from-de
    title: Spanisch B1 — Mittelstufe
    title_native: Español B1 — Intermedio
    target_language: es
    source_language: de
    level: B1
    path: sets/de/es-b1
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Mittelstufenkurs Spanisch B1 für Deutschsprachige (15
      Lektionen): baut auf A1+A2 auf mit dem subjuntivo (presente
      und Auslöser), condicional simple, pluscuamperfecto, der
      Passiv (ser-Passiv und pasiva refleja), dem estilo indirecto,
      vertieften Pronomen und Konnektoren sowie abstrakteren Themen
      (Arbeit, Gesundheit, Medien, Umwelt/Gesellschaft,
      interkulturelle Kommunikation) und der Textproduktion. Setzt
      das A1+A2-Wissen voraus, überwiegend produktiv. Erklärungen
      auf Deutsch (schema v1.3).
    tags:
      - intermediate
      - grammar
      - everyday
  - id: en-a1-from-de
    title: Englisch A1 (für Deutschsprachige)
    title_native: English A1 — Beginner
    target_language: en
    source_language: de
    level: A1
    path: sets/de/en-a1
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Vollständiger A1-Kurs Englisch für Deutschsprachige (15
      Lektionen): von Begrüßung, Zahlen und Artikeln über das
      Verb to be, Tagesablauf, Essen und Familie bis zum Simple
      Present und Simple Past. Mit Fokus auf typische Fehler und
      falsche Freunde. Erklärungen und Übersetzungen auf Deutsch.
    tags:
      - beginner
      - travel
      - everyday
  - id: en-a2-from-de
    title: Englisch A2 — Grundlagen
    title_native: English A2 — Elementary
    target_language: en
    source_language: de
    level: A2
    path: sets/de/en-a2
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Aufbaukurs Englisch A2 für Deutschsprachige (15 Lektionen):
      baut auf A1 auf mit den Verlaufsformen (Present/Past
      Progressive), dem Present Perfect und seiner Abgrenzung zum
      Simple Past, den Zukunftsformen (will, going to), den
      Modalverben (can/could/may, must/have to/should),
      Steigerung, Bedingungssätzen (zero, first, second
      conditional), einer Einführung ins Passiv und falschen
      Freunden. Mit Fokus auf typische Fehler von
      Deutschsprachigen. Setzt das A1-Wissen voraus. Erklärungen
      auf Deutsch (schema v1.3).
    tags:
      - elementary
      - grammar
      - everyday
  - id: en-b1-from-de
    title: Englisch B1 — Mittelstufe
    title_native: English B1 — Intermediate
    target_language: en
    source_language: de
    level: B1
    path: sets/de/en-b1
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Mittelstufenkurs Englisch B1 für Deutschsprachige (15
      Lektionen): baut auf A1+A2 auf mit Present Perfect vs. Past
      Simple (vertieft), Present Perfect Continuous, Past Perfect,
      den Conditionals II/III, dem Passiv, der Reported Speech und
      vertieften Relative Clauses sowie Linking Words, abstrakteren
      Themen (Arbeit, Gesundheit, Medien, Umwelt/Gesellschaft,
      interkulturelle Kommunikation), falschen Freunden und der
      Textproduktion. Mit Fokus auf typische Fehler von
      Deutschsprachigen. Setzt das A1+A2-Wissen voraus, überwiegend
      produktiv. Erklärungen auf Deutsch (schema v1.3).
    tags:
      - intermediate
      - grammar
      - everyday
  - id: psych-intro-from-de
    title: Psychologie — Grundlagen
    title_native: Psychologia — Fundamenta
    target_language: de
    source_language: de
    domain: psychology
    level: A1
    path: sets/de/psych-intro
    version: '1.18.0'
    lesson_count: 106
    description: >-
      Einführungskurs Psychologie auf Universitätsniveau für
      Deutschsprachige (106 Lektionen): Grundbegriffe und
      Geschichte, die Grundlagenfächer (Wahrnehmung, Gedächtnis,
      Lernen, Motivation/Emotion, Entwicklung, Sozial-,
      Persönlichkeits- und biologische Psychologie), klinische und
      positive Psychologie, Intelligenz, Stress, Bewusstsein und
      Schlaf, die Psychotherapieverfahren, Forschungsmethoden und
      Statistik, die angewandten Felder (pädagogische,
      Arbeits-/Organisations-, Gesundheitspsychologie,
      Diagnostik), vertiefte Grundlagenfächer, Geschichte und
      Paradigmen, Wissenschaftstheorie und Forschungsethik sowie
      vertiefende Blöcke zur Neuropsychologie, zur Arbeits- und
      Organisationspsychologie (mit Arbeitsstress und Burnout) und
      zur Pädagogischen Psychologie. Erklärt auf Deutsch, mit
      englischen Originalbegriffen in Klammern. Erstes
      Nicht-Sprachen-Set (domain: psychology).
    tags:
      - beginner
      - psychology
      - science
    book:
      title: "Psychologie"
      author: "Philip Zimbardo, Robert Johnson, Vivian McCann"
      isbn: "978-3868943238"
      url: "https://www.amazon.de/dp/3868943234/"
  - id: python-basics-from-de
    title: Python — Grundlagen
    title_native: Python — Basics
    target_language: de
    source_language: de
    domain: programming
    level: A1
    path: sets/de/python-basics
    version: '1.0.0'
    lesson_count: 15
    description: >-
      Einführung in die Programmierung mit Python für
      Deutschsprachige (15 Lektionen): von print() und Variablen
      über Strings, Listen, Bedingungen und Schleifen bis zu
      Funktionen, Dictionaries, Fehlerbehandlung, Modulen,
      Dateien und Comprehensions. Erklärt auf Deutsch, mit
      lauffähigen Code-Beispielen und erwarteter Ausgabe. Erstes
      Programmier-Set (domain: programming, schema v1.3).
    tags:
      - beginner
      - programming
      - python
  - id: ki-einsteiger-from-de
    title: KI für Einsteiger
    title_native: KI für Einsteiger
    target_language: de
    source_language: de
    domain: ai
    level: A1
    path: sets/de/ki-einsteiger
    version: '1.0.0'
    lesson_count: 12
    description: >-
      Begleitkurs zum Buch „KI für Einsteiger" von Asterios
      Raptis (12 Lektionen): KI im Alltag und Grundbegriffe,
      Prompt-Engineering (Grundlagen und Prompt-Typen), KI für
      Projekte, Lernen, Kreativität, Produktivität und Teamarbeit
      sowie ein Tool-Überblick und KI-Ethik. Erklärt auf Deutsch,
      mit eigenständigem Lerninhalt. Erstes KI-Set (domain: ai).
    tags:
      - beginner
      - ai
      - prompt-engineering
    book:
      title: "KI für Einsteiger"
      author: "Asterios Raptis"
      asin: "B0F43H6T2M"
      url: "https://www.amazon.de/dp/B0F43H6T2M"
