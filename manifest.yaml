    tags:
      - beginner
      - everyday
  - id: it-a1-from-de
    title: Italienisch A1 (für Deutschsprachige)
    title_native: Italiano A1
    target_language: it
    source_language: de
    level: A1
    path: sets/de/it-a1
    version: '1.0.0'
    lesson_count: 10
    domain: language
    description: >-
      Vollständiger A1-Kurs Italienisch für Deutschsprachige (10
