      Restaurant, Einkaufen, Artikel und Geschlecht, Uhrzeit und
      Wochentage, Familie, Farben und Adjektive sowie
      Wegbeschreibung. Erklärungen und Übersetzungen auf Deutsch,
      mit korrekten Akzenten und Kontextsätzen.
    tags:
      - beginner
      - everyday
