    description: >-
      Vollständiger A1-Kurs Koreanisch für Deutschsprachige (10
      Lektionen): Hangul lesen, Begrüßungen, sich vorstellen,
      Zahlen (sino-koreanisch und nativ), im Restaurant,
      Einkaufen, Uhrzeit und Wochentage, Familie, Gefühle und
      Adjektive sowie ein Überblick über die Höflichkeitsstufen.
      Vorderseiten in Hangul mit Revidierter Romanisierung in den
