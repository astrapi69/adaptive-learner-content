# exercises.yaml — the exercises, referencing cards by id (schema v1.4 PREVIEW)
# Every exercise needs an id (referenced from lesson.yaml structure) and a type.
exercises:
  - id: matching-01
    type: matching
    direction: target_to_source          # language lessons carry a direction
    title: "Words and meanings"
    cards: [card-hola, card-gracias, card-por-favor, card-adios]   # >= 3 pairs

  - id: free-01
    type: free_text
    title: "Say thank you"
    prompt:
      text: "Translate: thank you"
      language: en
    expected:
      language: es
      primary: "gracias"
      accepted: ["Gracias", "¡Gracias!"]   # >= 2 accepted answers
    distractors: [hola, por favor]          # required: plausible wrong answers
    grading:
      mode: lenient
      typo_tolerance: 1

  - id: cloze-01
    type: cloze
    title: "Politeness"
    prompt:
      text: "Un café, ___ ."                # ___ marks the blank
      language: es
    blanks:
      - accept: ["por favor"]

  - id: tiles-01
    type: word_tiles
    title: "Build a greeting"
    direction: source_to_target
    solution:
      language: es
      tokens: ["Hola", "gracias"]           # the correct sequence
    distractors:
      tokens: ["adiós"]                      # optional extra (wrong) tiles

  - id: picture-01
    type: picture_choice
    mode: word_to_meaning
    title: "Which word means goodbye?"
    card: card-adios
    distractor_strategy: same_category       # draw wrong options from same category
    distractor_count: 3
