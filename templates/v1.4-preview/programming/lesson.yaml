# lesson.yaml — PROGRAMMING domain (schema v1.4 PREVIEW, not yet supported)
# Difference vs language: domain: programming, no language_target, topic instead
# of CEFR level, and cards carry code fields (see note below). theory.md holds
# code blocks; cards.yaml cards add code_snippet / code_language / expected_output
# (these are real schema v1.3 fields — see ../../programming/lesson.json).
id: my-programming-lesson
schema_version: 1.4
title:
  de: "Meine Programmier-Lektion"
language_source: de
domain: programming
domain_config:
  topic: python_grundlagen
  level: einsteiger
estimated_duration_minutes: 12
version: 1.0.0
license: CC-BY-SA-4.0
author: your-handle
tags: [python, grundlagen]

prerequisites: []

learning_goals:
  - print() zur Ausgabe verwenden
  - Variablen anlegen und ausgeben

# In cards.yaml, code cards look like:
#   - id: py-print
#     front: "print()"
#     back: "Gibt Text auf der Konsole aus."
#     media_type: code
#     code_snippet: "print('Hallo Welt')"
#     code_language: python
#     expected_output: "Hallo Welt"

structure:
  - type: theory
    ref: theory.md#einleitung
    example_url: https://github.com/astrapi69/adaptive-learner-content-test
  - type: exercise_block
    title: "Code und Ausgabe"
    exercises: [matching-01, free-01]
  - type: exercise_block
    title: "Selbst schreiben"
    exercises: [cloze-01, tiles-01, picture-01]
  - type: review
    cards_count: 3
