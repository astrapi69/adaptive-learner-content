# lesson.yaml — KNOWLEDGE domain (schema v1.4 PREVIEW, not yet supported)
# Difference vs language: domain is a knowledge domain (here: psychology),
# there is NO language_target, and domain_config carries a `topic` instead of a
# CEFR level. Matching/free-text contexts use term/definition, not translation.
# theory.md / cards.yaml / exercises.yaml follow the same shapes as ../language/.
id: my-knowledge-lesson
schema_version: 1.4
title:
  de: "Mein Wissensthema"
language_source: de                    # for knowledge domains material and
                                       # explanation share ONE language
domain: psychology                     # a non-language domain (e.g. psychology)
domain_config:
  topic: kommunikation_und_beeinflussung   # free-form topic tag (no language_target)
  level: fortgeschritten                    # descriptive level, not CEFR
estimated_duration_minutes: 10
version: 1.0.0
license: CC-BY-SA-4.0
author: your-handle
tags: [psychologie, beispiel]

prerequisites: []

learning_goals:
  - Die zentralen Begriffe des Themas benennen
  - Die Begriffe voneinander abgrenzen

structure:
  - type: theory
    ref: theory.md#einleitung
    example_url: https://github.com/astrapi69/adaptive-learner-content-test
  - type: exercise_block
    title: "Begriffe und Definitionen"      # term/definition context
    exercises: [matching-01, free-01]
  - type: exercise_block
    title: "Vertiefung"
    exercises: [cloze-01, tiles-01, picture-01]
  - type: review
    cards_count: 3
