# Schema-mirror drift gate — pinned to the learn-content-engine release.
#
# schema/lesson.schema.json is a MIRROR of the learn-content-engine npm
# package (source-of-truth chain: adaptive-learner Pydantic -> engine ->
# this mirror; see schema/README.md). This job downloads the npm tarball
# of the PINNED engine version (schema/engine-version.txt) and compares
# it byte-for-byte against the committed mirror. It goes red if the
# mirror was hand-edited or a pin bump forgot the refresh — never
# against a floating branch: published npm versions are immutable, so
# the gate is deterministic. Bumping the pin is a deliberate PR that
# edits schema/engine-version.txt and refreshes the mirror together.
name: Schema mirror drift

on:
  pull_request:
    paths:
      - "schema/**"
      - "scripts/check_schema_drift.py"
      - "tests/test_check_schema_drift.py"
      - ".github/workflows/schema-drift.yml"
  push:
    branches: [main]
  # Manual trigger + a daily heartbeat so an accidental registry-side
  # anomaly or a broken mirror refresh is surfaced without a push.
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

# Coerce Node-runtime actions onto Node 24 as a safety net for any
# action still defaulting to the deprecated Node 20 runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install "pytest>=8,<9"
      - name: Drift-gate unit tests (pin mechanics, offline)
        run: python -m pytest tests/test_check_schema_drift.py -q
      - name: Check schema mirror against the pinned engine release
        run: python scripts/check_schema_drift.py
