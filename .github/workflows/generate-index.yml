# Auto-generate search-index.json (DIS-03).
#
# The search index is NEVER hand-maintained: on every push to main
# that touches the content tree (sets/) or the root manifest.yaml,
# this regenerates search-index.json from the manifests and, if it
# changed, commits it straight back to main. The "[skip ci]" tag on
# the auto-commit stops the push from re-triggering this workflow
# (self-healing loop guard, analogous to the self-healing deploy in
# #652).
name: Generate search index

on:
  push:
    branches: [main]
    paths:
      - "sets/**"
      - "manifest.yaml"
      - "recommended-repos.json"
      - "scripts/generate_search_index.py"

# Coerce Node-runtime actions onto Node 24 as a safety net for any
# action still defaulting to the deprecated Node 20 runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# The job commits the regenerated index back to the repo.
permissions:
  contents: write

# Never run two index regenerations against main at once.
concurrency:
  group: generate-search-index
  cancel-in-progress: false

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so ``git log`` yields accurate per-set
          # ``updated_at`` timestamps.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install generator dependencies
        run: pip install "pyyaml>=6,<7"
      - name: Regenerate search-index.json
        run: python scripts/generate_search_index.py
      - name: Commit & push if changed
        run: |
          if git diff --quiet -- search-index.json; then
            echo "search-index.json already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search-index.json
          git commit -m "docs: auto-update search-index.json [skip ci]"
          git push
