# French A1 set manifest (Phase 43 / EXP-002 / D-106; expanded
# in Phase 51 / v1.34.0).
#
# The Content-Loader fetches this once per download to learn
# the lesson filename list (``metadata.lessons``). Adding a
# new lesson is a two-line PR: add the JSON file under
# ``lessons/`` and append its filename here.
schema_version: '1.1'
name: French A1 (Beginner)
description: >-
  Ten-lesson A1-level French course: greetings, numbers,
  articles, the verbs être + avoir, self-introduction,
  family, colors + clothing, restaurant, directions, and
  an introduction to the passé composé. Roughly two hours
  of total content; each lesson runs 10-15 minutes.
sets:
  - id: language-fr-a1
    title: French A1 (Beginner)
    language: fr
    level: A1
    version: '1.2.0'
    lesson_count: 10
    domain: language
    description: >-
      Ten lessons covering A1 essentials. Bumps to v1.1.1
      whenever any lesson changes; v1.2.0 for additions.
    tags:
      - beginner
      - travel
      - everyday
metadata:
  author: Asterios Raptis
  license: CC-BY-SA-4.0
  # The Content-Loader's set-manifest parser reads this list
  # (commit 6 / service.py::_lesson_filenames_for_set). When
  # absent the loader falls back to ``01.json``..``NN.json``
  # by convention.
  lessons:
    - 01-greetings.json
    - 02-numbers.json
    - 03-articles.json
    - 04-etre-avoir.json
    - 05-se-presenter.json
    - 06-famille.json
    - 07-couleurs-vetements.json
    - 08-au-restaurant.json
    - 09-directions.json
    - 10-passe-compose.json
