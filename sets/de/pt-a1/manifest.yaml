# Portugiesisch (Brasilianisch) A1 (für Deutschsprachige) — Set-Manifest
#
# Brasilianisches Portugiesisch lernen, mit Erklärungen und
# Übersetzungen auf Deutsch. Der Content-Loader liest
# ``metadata.lessons`` für die Dateiliste.
schema_version: '1.3'
name: Portugiesisch (Brasilianisch) A1 (für Deutschsprachige)
description: >-
  Vollständiger A1-Kurs brasilianisches Portugiesisch für
  Deutschsprachige (10 Lektionen): Begrüßungen, sich vorstellen,
  Zahlen 1-30, im Restaurant, Einkaufen, Artikel und Geschlecht,
  Uhrzeit und Wochentage, Familie, Alltag sowie Reisen. Es wird
  durchgehend die brasilianische Variante verwendet (z. B. ônibus,
  trem, celular, você); Unterschiede zum europäischen
  Portugiesisch werden vermerkt. Karten-Rückseiten, Notizen und
  Theorie auf Deutsch.
