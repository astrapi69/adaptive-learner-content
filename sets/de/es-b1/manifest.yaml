    path: sets/de/es-b1
    version: '1.0.0'
    lesson_count: 15
    domain: language
    description: >-
      Mittelstufenkurs Spanisch B1 (15 Lektionen), auf Deutsch
      erklärt — vom subjuntivo über condicional, pluscuamperfecto,
      Passiv (ser/pasiva refleja) und estilo indirecto bis zu
      Pronomen, Konnektoren, abstrakteren Themen und der
      Textproduktion. Setzt das A1+A2-Wissen voraus und ist
      überwiegend produktiv ausgerichtet.
    tags:
      - intermediate
      - grammar
      - everyday
