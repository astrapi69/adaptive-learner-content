# Spanisch B1 (für Deutschsprachige) — Set-Manifest
# (schema v1.3).
#
# Aufbaukurs Spanisch B1, auf Deutsch erklärt. Setzt das gesamte
# A1- und A2-Wissen VORAUS (es-a1-from-de, es-a2-from-de) und
# wiederholt es nicht, sondern verweist nur darauf. B1 bringt
# komplexere Grammatik (subjuntivo, condicional, pluscuamperfecto,
# pasiva/pasiva refleja, estilo indirecto), längere Texte und
# abstraktere Themen. Schwerpunkt liegt auf der PRODUKTION: die
# Übungen sind überwiegend produktiv (>=70 % source_to_target).
# Schema v1.3 nutzt die optionalen Kartenfelder difficulty, tags
# und media_type ("text"). Der Content-Loader liest
# ``metadata.lessons`` für die Dateiliste.
schema_version: '1.3'
name: Spanisch B1 (für Deutschsprachige)
description: >-
  Spanisch B1 für Deutschsprachige (15 Lektionen): Aufbau auf
  A1+A2 mit dem subjuntivo (presente und Auslöser), condicional
  simple, pluscuamperfecto, der Passiv (ser-Passiv und pasiva
  refleja), dem estilo indirecto, vertieften Pronomen und
  Konnektoren sowie abstrakteren Themen (Arbeit, Gesundheit,
  Medien, Umwelt/Gesellschaft, interkulturelle Kommunikation) und
  einer Lektion zur Textproduktion. Erklärungen, Notizen und
  Theorie auf Deutsch.
sets:
