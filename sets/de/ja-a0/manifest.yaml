# Japanisch Schrift: Hiragana (Vorstufe) — Set-Manifest
#
# Vorstufe (A0) zum Japanisch-A1-Set: das komplette Hiragana-
# Silbenalphabet erkennen und lesen, bevor der eigentliche
# A1-Sprachkurs beginnt. Fokus liegt ausschließlich auf dem
# Erkennen und Lesen der Zeichen (Kana → Romaji und umgekehrt);
# Schreiben und Hörverstehen sind nicht Teil dieses Sets.
#
# Umschrift: Hepburn (shi, chi, tsu, fu, ji); bei Tipp-Aufgaben
# werden zusätzlich Kunrei-Varianten akzeptiert (si, ti, tu, hu,
# zi). In Lese-Aufgaben steht bei der abgefragten Kana nie die
# Romaji-Lesung daneben (kein Verraten der Antwort).
#
# Der Content-Loader liest ``metadata.lessons`` für die Dateiliste.
schema_version: '1.3'
name: 'Japanisch Schrift: Hiragana (Vorstufe)'
description: >-
  Vorstufe zum Japanisch-A1-Set: das komplette Hiragana-
  Silbenalphabet in zehn Lektionen erkennen und lesen lernen — von
  den fünf Vokalen über die Grundreihen (k, s, t, n, h, m, y, r, w)
  und die stimmhaften Zeichen (Dakuten/Handakuten: g, z, d, b, p)
  bis zu den Kombinationslauten (Yōon), dem kleinen tsu und langen
  Vokalen. Überwiegend Multiple-Choice (cloze select und
  multiselect) plus Zuordnungsübungen (matching) und Romaji-
  Tipp-Items. Es geht ausschließlich um das Erkennen und Lesen der
  Zeichen; Schreiben und Hörverstehen sind nicht Teil dieses Sets.
