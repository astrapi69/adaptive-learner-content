# Psychologie — Grundlagen (für Deutschsprachige) — Set-Manifest
# (Phase 60 / v1.44.0).
#
# Erstes Nicht-Sprachen-Set von Adaptive Learner. ``domain:
# psychology`` markiert den Inhalt als Sachthema: Material und
# Erklärung sind beide auf Deutsch (source_language ==
# target_language), und der Set-Ordner trägt einen Themennamen
# (``psych-intro``) statt eines ``{target}-{level}``-Namens. Der
# Content-Loader liest ``metadata.lessons`` für die Dateiliste.
#
# v1.1.0 (schema v1.3): erweitert um fünf vertiefende Lektionen
# (11–15) zu Intelligenz, Stress, biologischen Grundlagen,
# Bewusstsein/Schlaf und einer Wiederholung. Die neuen Karten
# nutzen die optionalen v1.3-Felder difficulty, tags und
# media_type ("text").
schema_version: '1.3'
name: Psychologie — Grundlagen
description: >-
  Einführung in die Psychologie für Deutschsprachige (15
  Lektionen): Grundbegriffe und Geschichte, Wahrnehmung,
  Gedächtnis, Lernen und Konditionierung, Motivation und Emotion,
  Entwicklungs-, Sozial- und Persönlichkeitspsychologie, ein
  behutsamer Überblick über die klinische und die positive
  Psychologie sowie Intelligenz und Denken, Stress und
  Gesundheit, biologische Grundlagen, Bewusstsein und Schlaf und
  eine abschließende Wiederholung. Karten, Definitionen und
  Theorie auf Deutsch, mit den englischen Originalbegriffen in
  Klammern.
sets:
  - id: psych-intro-from-de
    title: Psychologie — Grundlagen
    title_native: Psychologia — Fundamenta
    target_language: de
    source_language: de
    domain: psychology
    level: A1
    path: sets/de/psych-intro
    version: '1.1.0'
    lesson_count: 15
    domain_label: Psychologie
    description: >-
      Fünfzehn Einführungslektionen Psychologie, auf Deutsch
      erklärt — von Wundts erstem Labor über Intelligenz, Stress
      und das Gehirn bis zu Bewusstsein, Schlaf und einer
      abschließenden Wiederholung.
    tags:
      - beginner
      - psychology
      - science
