# Französisch B1 (für Deutschsprachige) — Set-Manifest
# (schema v1.3).
#
# Aufbaukurs Französisch B1, auf Deutsch erklärt. Setzt das
# gesamte A1- und A2-Wissen VORAUS (fr-a1-from-de, fr-a2-from-de)
# und wiederholt es nicht, sondern verweist nur darauf. B1 bringt
# komplexere Grammatik (Subjonctif, conditionnel passé,
# plus-que-parfait, Passiv, indirekte Rede), längere Texte und
# abstraktere Themen. Schwerpunkt liegt auf der PRODUKTION: die
# Übungen sind überwiegend produktiv (>=70 % source_to_target).
# Schema v1.3 nutzt die optionalen Kartenfelder difficulty, tags
# und media_type ("text"). Der Content-Loader liest
# ``metadata.lessons`` für die Dateiliste.
schema_version: '1.3'
name: Französisch B1 (für Deutschsprachige)
