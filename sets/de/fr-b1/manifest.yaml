  Französisch B1 für Deutschsprachige (15 Lektionen): Aufbau auf
  A1+A2 mit dem Subjonctif (présent und Auslöser), conditionnel
  passé, plus-que-parfait, Passiv, indirekter Rede, vertieften
  Relativpronomen und Konnektoren sowie abstrakteren Themen
  (Arbeit, Gesundheit, Medien, Umwelt/Gesellschaft, interkulturelle
  Kommunikation) und einer Lektion zur Textproduktion. Erklärungen,
  Notizen und Theorie auf Deutsch.
