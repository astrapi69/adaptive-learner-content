    lesson_count: 15
    domain: language
    description: >-
      Mittelstufenkurs Englisch B1 (15 Lektionen), auf Deutsch
      erklärt — von Present Perfect vs. Past Simple über Present
      Perfect Continuous, Past Perfect, Conditionals II/III,
      Passiv, Reported Speech und Relative Clauses bis zu Linking
      Words, abstrakteren Themen, falschen Freunden und der
      Textproduktion. Mit Fokus auf typische Fehler von
      Deutschsprachigen. Setzt das A1+A2-Wissen voraus,
      überwiegend produktiv.
    tags:
      - intermediate
      - grammar
      - everyday
