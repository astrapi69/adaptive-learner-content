# Englisch B1 (für Deutschsprachige) — Set-Manifest
# (schema v1.3).
#
# Aufbaukurs Englisch B1, auf Deutsch erklärt. Setzt das gesamte
# A1- und A2-Wissen VORAUS (en-a1-from-de, en-a2-from-de) und
# wiederholt es nicht. Schwerpunkt B1: komplexere Grammatik
# (Present Perfect vs. Past Simple vertieft, Present Perfect
# Continuous, Past Perfect, Conditionals II/III, Passiv, Reported
# Speech, Relative Clauses), längere Texte und abstraktere Themen.
# Englisch ist die meistgelernte Sprache — daher liegt der Fokus
# auf den typischen Fehlern Deutschsprachiger (Perfekt für alles,
# „If I were", falsche Freunde). Die Übungen sind überwiegend
# produktiv (>=70 % source_to_target). Schema v1.3 nutzt die
# optionalen Kartenfelder difficulty, tags und media_type ("text").
# Der Content-Loader liest ``metadata.lessons`` für die Dateiliste.
schema_version: '1.3'
name: Englisch B1 (für Deutschsprachige)
description: >-
  Englisch B1 für Deutschsprachige (15 Lektionen): Aufbau auf
  A1+A2 mit Present Perfect vs. Past Simple (vertieft), Present
  Perfect Continuous, Past Perfect, den Conditionals II und III,
  dem Passiv in allen Zeiten, der Reported Speech, vertieften
  Relative Clauses und Linking Words sowie abstrakteren Themen
  (Arbeit, Gesundheit, Medien, Umwelt/Gesellschaft,
  interkulturelle Kommunikation), falschen Freunden und einer
  Lektion zur Textproduktion. Erklärungen, Notizen und Theorie auf
  Deutsch.
sets:
  - id: en-b1-from-de
    title: Englisch B1 — Mittelstufe
    title_native: English B1 — Intermediate
    target_language: en
    source_language: de
    level: B1
    path: sets/de/en-b1
