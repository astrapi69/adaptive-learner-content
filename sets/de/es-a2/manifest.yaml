      Objekt- und Reflexivpronomen, por/para und die Vertiefung
      von ser/estar bis zur Einführung in den subjuntivo,
      Vergleichen, längeren Texten und Konnektoren. Setzt das
      A1-Wissen voraus und baut darauf auf.
    tags:
