# Spanisch A2 (für Deutschsprachige) — Set-Manifest
# (schema v1.3).
#
# Aufbaukurs Spanisch A2, auf Deutsch erklärt. Baut direkt auf
# dem A1-Set (es-a1-from-de) auf: die Lektionen setzen den
# A1-Stoff voraus und verweisen ausdrücklich darauf ("In A1 hast
# du … gelernt, jetzt …"). Schema v1.3 nutzt die optionalen
# Kartenfelder difficulty, tags und media_type ("text"). Die
# Übungsrichtung steigert sich progressiv: Lektionen 01–05
# gemischt, 06–10 zunehmend produktiv, 11–15 überwiegend
# produktiv. Der Content-Loader liest ``metadata.lessons`` für die
# Dateiliste.
schema_version: '1.3'
name: Spanisch A2 (für Deutschsprachige)
description: >-
  Spanisch A2 für Deutschsprachige (15 Lektionen): Aufbau auf A1
  mit den Vergangenheitsformen (indefinido vertieft, imperfecto,
  beide im Kontrast), futuro simple und condicional, den Objekt-
  und Reflexivpronomen, gustar, por vs. para, der Vertiefung von
  ser vs. estar, einer Einführung in den subjuntivo,
  Komparativ/Superlativ, längeren Lesetexten und Konnektoren.
  Karten-Rückseiten, Notizen und Theorie auf Deutsch.
sets:
