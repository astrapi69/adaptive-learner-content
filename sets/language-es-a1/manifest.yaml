# Spanish A1 set manifest (Phase 51B / v1.34.0).
#
# Shipped as a pilot Spanish set alongside the French A1
# set's v1.34.0 expansion. Same Content-Loader contract —
# the loader reads ``metadata.lessons`` to learn the lesson
# filename list.
schema_version: '1.1'
name: Spanish A1 (Beginner)
description: >-
  Five-lesson A1-level Spanish course: greetings + inverted
  punctuation, numbers + telling the time, articles + the
  -o/-a gender rule, the ser/estar distinction (the A1
  challenge), and ordering at a restaurant. Each lesson
  runs 12-15 minutes; full set takes ~70 minutes.
sets:
  - id: language-es-a1
    title: Español A1 (Principiante)
    language: es
    level: A1
    version: '1.1.0'
    lesson_count: 5
    domain: language
    description: >-
      Pilot Spanish set covering the A1 essentials, with
      ser/estar treated as the central A1 challenge that
      deserves a dedicated lesson + a callback in the
      restaurant lesson.
    tags:
      - beginner
      - travel
      - everyday
metadata:
  author: Asterios Raptis
  license: CC-BY-SA-4.0
  lessons:
    - 01-saludos.json
    - 02-numeros-hora.json
    - 03-articulos-genero.json
    - 04-ser-estar.json
    - 05-restaurante.json
