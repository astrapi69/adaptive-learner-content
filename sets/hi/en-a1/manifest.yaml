    target_language: en
    source_language: hi
    level: A1
    path: sets/hi/en-a1
    version: '1.1.0'
    lesson_count: 10
    domain: language
    description: >-
      English set for Hindi speakers (10 lessons): basic vocabulary,
      everyday sentences, grammar basics, family and relationships,
      food and drink, directions and places, shopping and money,
      time and date, politeness, and travel and transport.
    tags:
      - beginner
      - everyday
