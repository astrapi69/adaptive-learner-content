# (Phase 51B / v1.34.0).
#
# Sister manifest to ``fr-a1/manifest.yaml``. Both manifests
# can be bundled side-by-side into the GH-Pages build (Phase
# 51D) or hosted from separate sources in a content repo.
schema_version: '1.1'
name: Adaptive Learner Pilot Content — Spanish A1
description: >-
  Spanish A1 pilot set, sister to the French A1 set shipped
  in v1.27.0 and expanded in v1.34.0. Five lessons covering
  greetings, numbers, articles, ser/estar, and a restaurant
  scene.
sets:
  - id: language-es-a1
    title: Español A1 (Principiante)
    language: es
    level: A1
    version: '1.1.0'
    lesson_count: 5
    domain: language
    description: >-
      Five lessons covering A1 essentials, with the ser/estar
      challenge treated as the central A1 grammar topic.
      Runs ~70 minutes total. Demonstrates every Phase 43
      exercise type (matching, picture-choice, free-text,
      word-tiles).
